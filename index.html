<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111111">
  <link rel="manifest" href="/manifest.json">
  <title>Garage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      gap: 28px;
    }
    #btn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: none;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      background: #2ecc71;
      color: #fff;
      box-shadow: 0 0 40px rgba(46,204,113,0.35);
      transition: transform 0.08s ease, background 0.25s ease, box-shadow 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #btn:active  { transform: scale(0.93); }
    #btn.sending { background: #e67e22; box-shadow: 0 0 40px rgba(230,126,34,0.45); cursor: default; }
    #btn.done    { background: #2ecc71; box-shadow: 0 0 40px rgba(46,204,113,0.35); cursor: default; }
    #btn.error   { background: #e74c3c; box-shadow: 0 0 40px rgba(231,76,60,0.35); }
    #status { font-size: 0.85rem; color: #666; letter-spacing: 0.04em; text-transform: uppercase; }
    #setup-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 300px;
      text-align: center;
    }
    #setup-wrap strong { font-size: 1.1rem; }
    #setup-wrap p { color: #666; font-size: 0.9rem; line-height: 1.5; }
    #setup-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }
    #setup-input:focus { border-color: #2ecc71; }
    #setup-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: #2ecc71;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
    }
    #setup-err { color: #e74c3c; font-size: 0.8rem; min-height: 1em; }
    #countdown-number {
      font-size: 9rem;
      font-weight: 700;
      color: #2ecc71;
      line-height: 1;
      text-shadow: 0 0 60px rgba(46,204,113,0.55);
    }
    #countdown-label {
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    #cancel-btn {
      padding: 14px 48px;
      border-radius: 40px;
      border: 2px solid #444;
      background: transparent;
      color: #888;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #cancel-btn:active { border-color: #fff; color: #fff; }
  </style>
</head>
<body>
  <script>
    const params = new URLSearchParams(location.search);
    const urlToken = params.get('t');
    if (urlToken) {
      localStorage.setItem('garage_token', urlToken);
      history.replaceState(null, '', location.pathname);
    }

    let token = localStorage.getItem('garage_token');

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    let gen = 0;
    let currentTick = null;
    let visListenerAdded = false;

    token ? initApp() : showSetupScreen();

    function initApp() {
      const standalone = window.matchMedia('(display-mode: standalone)').matches
                      || window.navigator.standalone === true;

      if (standalone) {
        startCountdown();
        if (!visListenerAdded) {
          visListenerAdded = true;
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') startCountdown();
          });
        }
      } else {
        showButtonUI();
      }
    }

    function showSetupScreen() {
      document.body.innerHTML = `
        <div id="setup-wrap">
          <strong>Device not set up</strong>
          <p>Copy your setup link from the message Mark sent you, then paste it below.</p>
          <input id="setup-input" type="url" placeholder="Paste your setup link…" autocomplete="off" autocorrect="off" spellcheck="false">
          <button id="setup-btn">Save</button>
          <div id="setup-err"></div>
        </div>`;

      const input = document.getElementById('setup-input');
      const errEl = document.getElementById('setup-err');

      function tryToken(val) {
        val = val.trim();
        let tok = null;
        try { tok = new URL(val).searchParams.get('t'); } catch {}
        if (!tok && val.length > 8 && !val.includes(' ')) tok = val;
        if (!tok) { errEl.textContent = 'Invalid link — make sure you copied the whole URL.'; return; }
        localStorage.setItem('garage_token', tok);
        token = tok;
        initApp();
      }

      input.addEventListener('input', () => { if (input.value.includes('?t=')) tryToken(input.value); });
      document.getElementById('setup-btn').addEventListener('click', () => tryToken(input.value));
    }

    function startCountdown() {
      const myGen = ++gen;
      clearInterval(currentTick);
      let secs = 2;

      document.body.innerHTML = `
        <div id="countdown-label">Opening in</div>
        <div id="countdown-number">${secs}</div>
        <button id="cancel-btn">Cancel</button>`;

      const numEl = document.getElementById('countdown-number');

      document.getElementById('cancel-btn').addEventListener('click', () => {
        if (gen !== myGen) return;
        gen++;
        clearInterval(currentTick);
        showButtonUI();
      });

      currentTick = setInterval(() => {
        if (gen !== myGen) { clearInterval(currentTick); return; }
        secs--;
        if (secs > 0) {
          numEl.textContent = secs;
        } else {
          clearInterval(currentTick);
          fireTrigger(myGen);
        }
      }, 1000);
    }

    function showButtonUI() {
      document.body.innerHTML = `
        <button id="btn">Open Garage</button>
        <div id="status">Ready</div>`;

      const btn    = document.getElementById('btn');
      const status = document.getElementById('status');

      btn.addEventListener('click', async () => {
        if (btn.classList.contains('sending')) return;
        btn.classList.add('sending');
        btn.textContent = 'Sending…';
        status.textContent = '';

        try {
          const res = await fetch('/.netlify/functions/trigger', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
          });

          if (res.ok) {
            btn.textContent = 'Sent!';
            btn.classList.replace('sending', 'done');
            status.textContent = 'Done';
          } else if (res.status === 401) {
            btn.textContent = 'Not Authorised';
            btn.classList.replace('sending', 'error');
            status.textContent = 'Token rejected';
            return;
          } else {
            throw new Error('HTTP ' + res.status);
          }
        } catch (err) {
          btn.textContent = 'Error';
          btn.classList.replace('sending', 'error');
          status.textContent = err.message;
          return;
        }

        setTimeout(() => {
          btn.classList.remove('sending', 'error', 'done');
          btn.textContent = 'Open Garage';
          status.textContent = 'Ready';
        }, 1500);
      });
    }

    async function fireTrigger(myGen) {
      if (gen !== myGen) return;

      document.body.innerHTML = `
        <button id="btn" class="sending">Sending…</button>
        <div id="status"></div>`;

      const btn    = document.getElementById('btn');
      const status = document.getElementById('status');

      try {
        const res = await fetch('/.netlify/functions/trigger', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
        });

        if (gen !== myGen) return;

        if (res.ok) {
          btn.textContent = 'Done!';
          btn.classList.replace('sending', 'done');
          status.textContent = 'Signal sent';
        } else if (res.status === 401) {
          btn.textContent = 'Not Authorised';
          btn.classList.replace('sending', 'error');
          status.textContent = 'Token rejected';
        } else {
          throw new Error('HTTP ' + res.status);
        }
      } catch (err) {
        if (gen !== myGen) return;
        btn.textContent = 'Error';
        btn.classList.replace('sending', 'error');
        status.textContent = err.message;
      }

      setTimeout(() => { if (gen === myGen) showButtonUI(); }, 2000);
    }
  </script>
</body>
</html>
