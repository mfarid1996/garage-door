<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Garage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      gap: 28px;
    }
    #btn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: none;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      background: #2ecc71;
      color: #fff;
      box-shadow: 0 0 40px rgba(46,204,113,0.35);
      transition: transform 0.08s ease, background 0.25s ease, box-shadow 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #btn:active  { transform: scale(0.93); }
    #btn.sending { background: #e67e22; box-shadow: 0 0 40px rgba(230,126,34,0.45); cursor: default; }
    #btn.error   { background: #e74c3c; box-shadow: 0 0 40px rgba(231,76,60,0.35); }
    #status { font-size: 0.85rem; color: #666; letter-spacing: 0.04em; text-transform: uppercase; }
    #denied {
      text-align: center;
      padding: 2rem;
      color: #888;
      font-size: 1rem;
      line-height: 1.6;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <script>
    const params = new URLSearchParams(location.search);
    const urlToken = params.get('t');
    if (urlToken) {
      localStorage.setItem('garage_token', urlToken);
      history.replaceState(null, '', location.pathname);
    }

    const token = localStorage.getItem('garage_token');

    if (!token) {
      document.body.innerHTML = '<div id="denied">This device is not authorised.<br><br>Ask Mark to send you an access link.</div>';
    } else {
      document.body.innerHTML = `
        <button id="btn">Open Garage</button>
        <div id="status">Ready</div>`;

      const btn    = document.getElementById('btn');
      const status = document.getElementById('status');

      btn.addEventListener('click', async () => {
        if (btn.classList.contains('sending')) return;
        btn.classList.add('sending');
        btn.textContent = 'Sending…';
        status.textContent = '';

        try {
          const res = await fetch('/.netlify/functions/trigger', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
          });

          if (res.ok) {
            btn.textContent = 'Sent!';
            status.textContent = 'Done';
          } else if (res.status === 401) {
            btn.textContent = 'Not Authorised';
            btn.classList.replace('sending', 'error');
            status.textContent = 'Token rejected';
            return;
          } else {
            throw new Error('HTTP ' + res.status);
          }
        } catch (err) {
          btn.textContent = 'Error';
          btn.classList.replace('sending', 'error');
          status.textContent = err.message;
          return;
        }

        setTimeout(() => {
          btn.classList.remove('sending', 'error');
          btn.textContent = 'Open Garage';
          status.textContent = 'Ready';
        }, 1500);
      });
    }
  </script>
</body>
</html>
